# =============================================================================
# blacklist-nouveau.conf — Block nouveau to prevent driver conflicts
# =============================================================================
# The open-source nouveau driver and the proprietary nvidia driver cannot
# be loaded simultaneously. Blacklisting nouveau here ensures the proprietary
# driver always takes precedence on systems with supported NVIDIA GPUs.
# =============================================================================

blacklist nouveau
blacklist rivafb
blacklist nvidiafb
blacklist rivatv
blacklist nv

# Prevent nouveau from loading via install alias trick (belt-and-suspenders).
install nouveau /bin/false
