# =============================================================================
# nvidia.conf — NVIDIA modprobe options
# =============================================================================
# Enable DRM kernel mode-setting. Required for:
#   - Wayland compositors (KWin/Wayland, gamescope)
#   - Early framebuffer / smooth VT switching
#   - Explicit sync support (improves frame pacing in games)
# =============================================================================

options nvidia-drm modeset=1
options nvidia-drm fbdev=1

# Preserve video memory allocations across suspend/resume cycles.
options nvidia NVreg_PreserveVideoMemoryAllocations=1

# Enable dynamic power management (RTD3) on Ampere+ GPUs.
options nvidia NVreg_DynamicPowerManagement=0x02
