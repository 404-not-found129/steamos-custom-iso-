# =============================================================================
# mkinitcpio.conf — Initramfs configuration with NVIDIA modules
# Custom SteamOS ISO — NVIDIA Edition
# =============================================================================
# MODULES: NVIDIA kernel modules are loaded early (before udev) to ensure
# DRM mode-setting is available as early as possible during boot.
# Order matters: nvidia must precede nvidia_modeset, which must precede
# nvidia_drm. nvidia_uvm is the unified-memory module (required for CUDA/NVENC).
# =============================================================================

MODULES=(nvidia nvidia_modeset nvidia_uvm nvidia_drm)

# Block list of modules that should NOT be auto-loaded (prevents conflicts
# with open-source nouveau driver that ships with linux-firmware).
FILES=()

BINARIES=()

# ---------------------------------------------------------------------------
# Hooks — keep the standard live-ISO hook chain; add keyboard/keymap early
# so users can type at any early-userspace prompt.
# ---------------------------------------------------------------------------
HOOKS=(base udev autodetect modconf kms keyboard keymap consolefont block filesystems fsck)

# ---------------------------------------------------------------------------
# Compression — xz gives the best ratio for ISO squashfs payloads.
# ---------------------------------------------------------------------------
COMPRESSION="xz"
COMPRESSION_OPTIONS=(-9 -e)
