# =============================================================================
# grub.cfg — GRUB2 bootloader configuration
# Custom SteamOS ISO — NVIDIA Edition
# =============================================================================
# This file is used for BIOS/Legacy boot via GRUB2 El Torito.
# For UEFI, systemd-boot entries under efiboot/ take precedence.
# =============================================================================

set default=0
set timeout=5
set timeout_style=menu

# Load required modules
insmod all_video
insmod font
insmod gfxterm
insmod png

if loadfont "${prefix}/fonts/unicode.pf2"; then
    terminal_output gfxterm
fi

# ---------------------------------------------------------------------------
# Boot entries
# ---------------------------------------------------------------------------

menuentry "Custom SteamOS ISO (NVIDIA — Recommended)" --class arch --class gnu-linux --class gnu --class os {
    set gfxpayload=keep
    linux   /arch/boot/x86_64/vmlinuz-linux \
            archisobasedir=arch \
            archisodevice=UUID=%ARCHISO_UUID% \
            nvidia-drm.modeset=1 \
            nvidia-drm.fbdev=1 \
            quiet splash loglevel=3 rd.udev.log_level=3 \
            vt.global_cursor_default=0
    initrd  /arch/boot/intel-ucode.img
    initrd  /arch/boot/amd-ucode.img
    initrd  /arch/boot/x86_64/initramfs-linux.img
}

menuentry "Custom SteamOS ISO (Fallback — No NVIDIA)" --class arch --class gnu-linux --class gnu --class os {
    set gfxpayload=keep
    linux   /arch/boot/x86_64/vmlinuz-linux \
            archisobasedir=arch \
            archisodevice=UUID=%ARCHISO_UUID% \
            nomodeset quiet loglevel=3
    initrd  /arch/boot/intel-ucode.img
    initrd  /arch/boot/amd-ucode.img
    initrd  /arch/boot/x86_64/initramfs-linux-fallback.img
}

menuentry "UEFI Shell" {
    insmod chain
    search --no-floppy --set=root --label %ARCHISO_LABEL%
    chainloader /EFI/Shell_x64.efi
}

menuentry "System shutdown" {
    echo "System shutting down..."
    halt
}

menuentry "System restart" {
    echo "System restarting..."
    reboot
}
