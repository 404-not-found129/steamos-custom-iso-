# =============================================================================
# pacman.conf — pacman configuration for ISO build
# Custom SteamOS ISO — NVIDIA Edition
# =============================================================================
# This file is used by mkarchiso during the build process.
# It differs from the host's /etc/pacman.conf in that it may include
# additional repositories (e.g. multilib for lib32-* packages, and
# optionally a HoloISO/CachyOS repo for linux-neptune).
# =============================================================================

[options]
HoldPkg      = pacman glibc
Architecture = auto
ParallelDownloads = 5

# Enable colour output in build logs
Color

CheckSpace

SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# ---------------------------------------------------------------------------
# Repositories
# ---------------------------------------------------------------------------

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# multilib is required for lib32-nvidia-utils, lib32-mesa, steam, etc.
[multilib]
Include = /etc/pacman.d/mirrorlist

# ---------------------------------------------------------------------------
# Optional: HoloISO repository (uncomment to use linux-neptune kernel)
# Provides: linux-neptune, linux-neptune-headers, linux-neptune-firmware
# ---------------------------------------------------------------------------
# [holoiso-main]
# SigLevel = Never
# Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch

# ---------------------------------------------------------------------------
# Optional: CachyOS repository (alternative optimised kernel builds)
# ---------------------------------------------------------------------------
# [cachyos]
# Include = /etc/pacman.d/cachyos-mirrorlist
