## =============================================================================
## archiso_sys-linux.cfg — Syslinux (BIOS MBR) boot configuration
## Custom SteamOS ISO — NVIDIA Edition
## =============================================================================

UI menu.c32
PROMPT 0
MENU TITLE Custom SteamOS ISO — NVIDIA Edition
TIMEOUT 50
DEFAULT nvidia

LABEL nvidia
    MENU LABEL Boot Custom SteamOS ISO (NVIDIA)
    LINUX    /arch/boot/x86_64/vmlinuz-linux
    INITRD   /arch/boot/intel-ucode.img,/arch/boot/amd-ucode.img,/arch/boot/x86_64/initramfs-linux.img
    APPEND   archisobasedir=arch archisodevice=UUID=%ARCHISO_UUID% nvidia-drm.modeset=1 nvidia-drm.fbdev=1 quiet splash loglevel=3 vt.global_cursor_default=0

LABEL fallback
    MENU LABEL Boot Custom SteamOS ISO (Fallback / No NVIDIA)
    LINUX    /arch/boot/x86_64/vmlinuz-linux
    INITRD   /arch/boot/intel-ucode.img,/arch/boot/amd-ucode.img,/arch/boot/x86_64/initramfs-linux-fallback.img
    APPEND   archisobasedir=arch archisodevice=UUID=%ARCHISO_UUID% nomodeset quiet loglevel=3

LABEL memtest
    MENU LABEL Run Memtest86+
    LINUX    /boot/memtest86+/memtest.bin
    APPEND   -
