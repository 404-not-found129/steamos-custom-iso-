# =============================================================================
# 02-archiso-x86_64-fallback.conf — EFI boot entry (fallback / non-NVIDIA)
# =============================================================================
# Use this entry on systems without an NVIDIA GPU or when the proprietary
# driver causes issues. Boots without nvidia-drm kernel parameters.
# =============================================================================

title   Custom SteamOS ISO (Fallback / No NVIDIA)
linux   /arch/boot/x86_64/vmlinuz-linux
initrd  /arch/boot/intel-ucode.img
initrd  /arch/boot/amd-ucode.img
initrd  /arch/boot/x86_64/initramfs-linux-fallback.img
options archisobasedir=arch archisodevice=UUID=%ARCHISO_UUID% \
        nomodeset quiet splash loglevel=3
