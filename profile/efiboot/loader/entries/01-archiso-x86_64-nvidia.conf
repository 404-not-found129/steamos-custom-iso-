# =============================================================================
# 01-archiso-x86_64-nvidia.conf — EFI boot entry (NVIDIA — recommended)
# systemd-boot loader entry for Custom SteamOS ISO
# =============================================================================
# nvidia-drm.modeset=1  — enable DRM kernel mode-setting (required for Wayland)
# nvidia-drm.fbdev=1    — expose a /dev/fbX framebuffer via DRM (KMS console)
# quiet splash          — suppress kernel log noise; show Plymouth splash
# =============================================================================

title   Custom SteamOS ISO (NVIDIA)
linux   /arch/boot/x86_64/vmlinuz-linux
initrd  /arch/boot/intel-ucode.img
initrd  /arch/boot/amd-ucode.img
initrd  /arch/boot/x86_64/initramfs-linux.img
options archisobasedir=arch archisodevice=UUID=%ARCHISO_UUID% \
        nvidia-drm.modeset=1 nvidia-drm.fbdev=1 \
        quiet splash loglevel=3 rd.udev.log_level=3 \
        vt.global_cursor_default=0
